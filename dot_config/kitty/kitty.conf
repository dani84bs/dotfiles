# --- Shell Configuration ---
# On macOS, this points to the Homebrew Fish path. 
# On Debian, you might need to change this to /usr/bin/fish or simply 'fish'.
# shell fish --login

# --- Font Settings ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        18.0

# Disable ligatures (equivalent to -calt, -clig, -liga)
disable_ligatures always

# --- Theme and Appearance (Ir Black) ---
# Kitty doesn't bundle "Ir Black" by default, so we define the colors here.
foreground            #fdfbee
background            #000000
selection_foreground  #fdfbee
selection_background  #484848

# 16 Color Palette (Ir Black)
color0  #000000
color8  #484848
color1  #ff6c60
color9  #ff6c60
color2  #a8ff60
color10 #a8ff60
color3  #ffffb6
color11 #ffffb6
color4  #96cbfe
color12 #96cbfe
color5  #ff73fd
color13 #ff73fd
color6  #c6c5fe
color14 #c6c5fe
color7  #eeeeee
color15 #ffffff

# Opacity (1.0 = fully opaque)
background_opacity 1.0

# Window Padding (Set to 0 to keep text against the edges)
window_padding_width 0

# --- Window Decorations and macOS Specifics ---
# Matches 'macos-titlebar-style = transparent'
macos_titlebar_color               background
macos_option_as_alt                yes
macos_quit_when_last_window_closed yes
macos_show_window_title_in         none

# Window decorations (borders and titlebar)
# Equivalent to 'window-decoration = true'
hide_window_decorations no

# --- Mouse and Clipboard ---
copy_on_select yes
clipboard_control write-clipboard write-primary read-clipboard read-primary
shell_integration enabled

# Capture Shift key for mouse events (matches Ghostty mouse-shift-capture)
focus_follows_mouse yes
